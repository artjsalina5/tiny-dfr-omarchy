# tiny-dfr commands

Command_1  = "omarchy-menu"
Command_2  = "uwsm app -- alacritty"
Command_3  = "omarchy-menu apps"
Command_4  = "omarchy-menu trigger"
Command_5  = "omarchy-menu setup"
Command_6  = "omarchy-launch-about"
Command_99 = "code"

# Omarchy
Command_OmarchyMenu    = "omarchy-menu"
Command_OmarchyApps    = "omarchy-menu apps"
Command_OmarchyTrigger = "omarchy-menu trigger"
Command_OmarchyStyle   = "omarchy-menu style"
Command_OmarchySetup   = "omarchy-menu setup"
Command_OmarchyInstall = "omarchy-menu install"
Command_OmarchyRemove  = "omarchy-menu remove"
Command_OmarchySystem  = "omarchy-menu system"
Command_OmarchyPower   = "omarchy-menu power"
Command_Alacritty      = "uwsm app -- alacritty"
Command_ColorPicker    = "pkill hyprpicker || hyprpicker -a"

# Additional Omarchy Commands
Command_OmarchyClipboard      = "omarchy-menu clipboard"
Command_OmarchyEmoji          = "omarchy-menu emoji"
Command_OmarchyNotifications  = "omarchy-menu notifications"
Command_OmarchyWindows        = "omarchy-menu windows"
Command_OmarchyWorkspaces     = "omarchy-menu workspaces"
Command_OmarchyFiles          = "omarchy-launch-files"
Command_OmarchyTerminal       = "omarchy-launch-terminal"
Command_OmarchySystemMonitor  = "omarchy-launch-system"

# Omarchy Theme & Wallpaper
Command_ThemeNext       = "omarchy-theme-next"
Command_ThemeCurrent    = "omarchy-theme-current"
Command_WallpaperNext   = "omarchy-theme-bg-next"

# Touch Bar Diagnostics
Command_TouchBarStatus    = "omarchy-touchbar-status"
Command_TouchBarRestart   = "omarchy-touchbar-restart"
Command_TouchBarLogs      = "sh -lc 'omarchy-launch-terminal -- journalctl -u tiny-dfr.service -f'"
Command_TouchBarDebug     = "omarchy-touchbar-debug"

# Display brightness (internal panel via iGPU gmux backlight)
Command_DisplayBrightnessDown = "brightnessctl -d gmux_backlight set 5%-"
Command_DisplayBrightnessUp   = "brightnessctl -d gmux_backlight set +5%"
Command_Refresh               = "sh -lc \"hyprctl dispatch dpms off; sleep 1; hyprctl dispatch dpms on && brightnessctl -r\""

# Screenshots
Command_CaptureControls   = "omarchy-menu capture"
Command_ScreenshotRegion  = "sh -c 'sleep 0.2; omarchy-cmd-screenshot region'"
Command_ScreenshotWindow  = "sh -c 'sleep 0.2; omarchy-cmd-screenshot windows'"
Command_ScreenshotDisplay = "sh -c 'sleep 0.2; omarchy-cmd-screenshot fullscreen'"

# Screen recording
Command_ScreenrecordRegion       = "sh -c \"omarchy-cmd-screenrecord region\""
Command_ScreenrecordRegionAudio  = "sh -c \"omarchy-cmd-screenrecord region-audio\""
Command_ScreenrecordDisplay      = "sh -c \"omarchy-cmd-screenrecord display\""
Command_ScreenrecordDisplayAudio = "sh -c \"omarchy-cmd-screenrecord display-audio\""

# Apps
Command_Btop                  = "tiny-dfr-terminal-exec btop"
Command_Wiremix               = "wiremix"
Command_Audio                 = "omarchy-launch-audio"
Command_Walker                = "walker"
Command_Browser               = "xdg-open https://"
Command_Browser_v2            = "omarchy-launch-browser"
Command_Omarchy_Browser       = "omarchy-launch-browser"
Command_Editor                = "omarchy-launch-editor"
Command_WiFi                  = "nmtui"
Command_WiFi_v2               = "omarchy-launch-wifi"
Command_Screensaver           = "hyprlock"
Command_Power                 = "omarchy-menu power"
Command_Share                 = "wl-copy"
Command_AudioSwitch           = "wpctl set-default"
Command_Clipboard             = "uwsm app -- cliphist list | wofi --dmenu | cliphist decode | wl-copy"
Command_WindowCloseAll        = "hyprctl dispatch killactive"
Command_WindowPop             = "hyprctl dispatch togglefloating"
Command_WorkspaceToggleGaps   = "hyprctl keyword general:gaps_in 0"
