# tiny-dfr commands

Command_1  = "omarchy-menu"
Command_2  = "uwsm app -- alacritty"
Command_3  = "omarchy-menu apps"
Command_4  = "omarchy-menu trigger"
Command_5  = "omarchy-menu setup"
Command_6  = "omarchy-launch-about"
Command_99 = "code"

# Omarchy
Command_OmarchyMenu    = "omarchy-menu"
Command_OmarchyApps    = "omarchy-menu apps"
Command_OmarchyTrigger = "omarchy-menu trigger"
Command_OmarchyStyle   = "omarchy-menu style"
Command_OmarchySetup   = "omarchy-menu setup"
Command_OmarchyInstall = "omarchy-menu install"
Command_OmarchyRemove  = "omarchy-menu remove"
Command_OmarchySystem  = "omarchy-menu system"
Command_OmarchyPower   = "omarchy-menu power"
Command_Alacritty      = "uwsm app -- alacritty"
Command_ColorPicker    = "pkill hyprpicker || hyprpicker -a"

# Additional Omarchy Commands
Command_OmarchyClipboard      = "omarchy-launch-walker -m clipboard"
Command_OmarchyEmoji          = "omarchy-launch-walker -m symbols"
Command_OmarchyNotifications  = "omarchy-menu notifications"
Command_OmarchyWindows        = "omarchy-launch-walker -m windows"
Command_OmarchyWorkspaces     = "omarchy-launch-walker -m workspaces"
Command_OmarchyFiles          = "omarchy-launch-files"
Command_OmarchyTerminal       = "omarchy-launch-terminal"
Command_OmarchySystemMonitor  = "tiny-dfr-terminal-exec btop"

# Omarchy Theme & Wallpaper
Command_ThemeNext       = "omarchy-menu style"
Command_ThemeCurrent    = "omarchy-theme-current"
Command_WallpaperNext   = "omarchy-theme-bg-next"

# Touch Bar Diagnostics
Command_TouchBarStatus    = "omarchy-touchbar-status"
Command_TouchBarRestart   = "omarchy-touchbar-restart"
Command_TouchBarLogs      = "omarchy-launch-floating-terminal-with-presentation journalctl -u tiny-dfr-omarchy.service -f"
Command_TouchBarDebug     = "omarchy-touchbar-debug"

# Display brightness (internal panel via iGPU gmux backlight)
Command_DisplayBrightnessDown = "brightnessctl -d gmux_backlight set 5%- >/dev/null; omarchy-swayosd-brightness $(brightnessctl -d gmux_backlight -m | cut -d',' -f4 | tr -d '%')"
Command_DisplayBrightnessUp   = "brightnessctl -d gmux_backlight set +5% >/dev/null; omarchy-swayosd-brightness $(brightnessctl -d gmux_backlight -m | cut -d',' -f4 | tr -d '%')"
Command_Refresh               = "omarchy-cmd-display refresh"

# Screenshots
Command_CaptureControls   = "omarchy-menu capture"
Command_ScreenshotRegion  = "omarchy-cmd-screenshot region"
Command_ScreenshotWindow  = "omarchy-cmd-screenshot windows"
Command_ScreenshotDisplay = "omarchy-cmd-screenshot fullscreen"

# Screen recording
Command_ScreenrecordRegion       = "omarchy-cmd-screenrecord region"
Command_ScreenrecordRegionAudio  = "omarchy-cmd-screenrecord region-audio"
Command_ScreenrecordDisplay      = "omarchy-cmd-screenrecord display"
Command_ScreenrecordDisplayAudio = "omarchy-cmd-screenrecord display-audio"

# Apps
Command_Btop                  = "tiny-dfr-terminal-exec btop"
Command_Wiremix               = "wiremix"
Command_Audio                 = "omarchy-launch-audio"
Command_Walker                = "walker"
Command_Browser               = "omarchy-launch-browser"
Command_Editor                = "omarchy-launch-editor"
Command_WiFi                  = "omarchy-launch-wifi"
Command_Screensaver           = "hyprlock"
Command_Power                 = "omarchy-menu power"
Command_Share                 = "wl-copy"
Command_AudioSwitch           = "wpctl set-default"
Command_Clipboard             = "omarchy-launch-walker -m clipboard"
Command_WindowCloseAll        = "omarchy-cmd-window killactive"
Command_WindowPop             = "omarchy-cmd-window togglefloating"
Command_WorkspaceToggleGaps   = "omarchy-cmd-workspace toggle-gaps"
